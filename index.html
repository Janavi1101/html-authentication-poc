<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="card p-4" style="width:350px;">
    <h3 class="text-center">Login</h3>

    <form onsubmit="handleLogin(event)">
    
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input class="form-control" required>
        </div>

        
        <label class="form-label">Password</label>
        <div class="mb-2 position-relative">
            <input type="password" id="password" class="form-control" onkeyup="checkStrength()" required>
            <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3"
            onclick="togglePassword('password', this)"></i>
        </div>
        

        <button class="btn btn-custom w-100">
            Login <span class="spinner-border spinner-border-sm d-none"></span>
        </button>
    </form>

    <div class="text-center mt-3">

    <a href="forgot.html" class="d-block mb-2">Forgot Password?</a>

    <p class="mb-0">
        New user? 
        <a href="register.html" class="fw-bold">Register here</a>
    </p>

    </div>
    </div>

<script>

// Spinner + redirect
function handleLogin(e) {
    e.preventDefault();
    let btn = e.target.querySelector("button");
    let spinner = btn.querySelector(".spinner-border");

    spinner.classList.remove("d-none");

    setTimeout(() => {
        window.location.href = "dashboard.html";
    }, 1000);
}
function togglePassword(id, icon) {
        let input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
        icon.classList.toggle("bi-eye");
        icon.classList.toggle("bi-eye-slash");
    }

// Page fade
document.body.style.opacity = 0;
window.onload = () => document.body.style.opacity = 1;
</script>

</body>
</html>
