<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="card p-4" style="width:400px;">
    <h3 class="text-center">Register</h3>

    <form onsubmit="validateForm(event)">

        <div class="mb-2">
            <label class="form-label">Full Name</label>
            <input class="form-control" required>
        </div>

        <div class="mb-2">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" required>
        </div>

        <div class="mb-2">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-control" required>
        </div>


        <label class="form-label">Password</label>
        <div class="mb-2 position-relative">
            <input type="password" id="password" class="form-control" onkeyup="checkStrength()" required>
            <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3"
            onclick="togglePassword('password', this)"></i>
        </div>

        <div id="strengthBar" class="strength-bar"></div>

        <label class="form-label">Confirm Password</label>
        <div class="mb-3 position-relative">
            <input type="password" id="confirmPassword" class="form-control" required>
            <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3"
            onclick="togglePassword('confirmPassword', this)"></i>
        </div>

        <button class="btn btn-custom w-100">
            Register <span class="spinner-border spinner-border-sm d-none"></span>
        </button>

    </form>

    <div class="text-center mt-3">
        <a href="index.html">Back to Login</a>
    </div>
    </div>

<script>

    function togglePassword(id, icon) {
        let input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
        icon.classList.toggle("bi-eye");
        icon.classList.toggle("bi-eye-slash");
    }

    function checkStrength() {
        let pass = document.getElementById("password").value;
        let bar = document.getElementById("strengthBar");

        if (pass.length < 4) bar.className = "strength-bar weak";
        else if (pass.length < 8) bar.className = "strength-bar medium";
        else bar.className = "strength-bar strong";
    }

    function validateForm(e) {
        e.preventDefault();

        let pass = document.getElementById("password").value;
        let confirm = document.getElementById("confirmPassword").value;

        if (pass !== confirm) {
            alert("Passwords do not match!");
            return;
        }

        let btn = e.target.querySelector("button");
        let spinner = btn.querySelector(".spinner-border");
        spinner.classList.remove("d-none");

        setTimeout(() => {
            window.location.href = "index.html";
        }, 1000);
    }

    document.body.style.opacity = 0;
    window.onload = () => document.body.style.opacity = 1;
</script>

</body>
</html>
