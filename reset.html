<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="card p-4" style="width:350px;">
    <h4 class="text-center">Reset Password</h4>

    <form onsubmit="resetPass(event)">

        <label class="form-label">New Password</label>
        <div class="position-relative mb-2">
            <input type="password" id="newPass" class="form-control" required>
            <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3"
            onclick="togglePassword('newPass', this)"></i>
        </div>

        <label class="form-label">Confirm Password</label>
        <div class="position-relative mb-2">
            <input type="password" id="confirmPass" class="form-control " required>
            <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3"
            onclick="togglePassword('confirmPass', this)"></i>
        </div>
        <button class="btn btn-custom w-100">
            Update <span class="spinner-border spinner-border-sm d-none"></span>
        </button>

    </form>
    </div>

<script>
function togglePassword(id, icon) {
    let input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
    icon.classList.toggle("bi-eye");
    icon.classList.toggle("bi-eye-slash");
}

function resetPass(e) {
    e.preventDefault();
    let spinner = e.target.querySelector(".spinner-border");
    spinner.classList.remove("d-none");

    setTimeout(() => {
        window.location.href = "index.html";
    }, 1000);
}
function validateForm(e) {
        e.preventDefault();

        let pass = document.getElementById("newPass").value;
        let confirm = document.getElementById("confirmPass").value;

        if (pass !== confirm) {
            alert("Passwords do not match!");
            return;
        }

        let btn = e.target.querySelector("button");
        let spinner = btn.querySelector(".spinner-border");
        spinner.classList.remove("d-none");

        setTimeout(() => {
            window.location.href = "index.html";
        }, 1000);
 }

</script>

</body>
</html>
